<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyung-Seok Oh | Academic Page</title>
  <style>
    :root {
      --bg: #fcfbf8;
      --surface: #ffffff;
      --text: #1f1f1b;
      --muted: #6d6a62;
      --line: #e8e2d8;
      --accent: #2e5aac;
      --max: 920px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Inter", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      letter-spacing: -0.01em;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3, p { margin: 0; }

    .container {
      width: min(calc(100% - 36px), var(--max));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(252, 251, 248, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      font-size: 0.94rem;
    }

    .brand {
      font-weight: 700;
      color: var(--text);
    }

    .menu {
      display: flex;
      gap: 10px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .menu a {
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 999px;
      transition: background-color .18s ease, color .18s ease;
    }

    .menu a.active,
    .menu a:hover {
      color: var(--accent);
      background: #f2f5fb;
      text-decoration: none;
    }

    main { padding: 34px 0 60px; }
    section {
      padding: 26px 0;
      scroll-margin-top: 72px;
    }

    .reveal {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity .55s ease, transform .55s ease;
    }

    .reveal.is-visible {
      opacity: 1;
      transform: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 28px;
      align-items: start;
    }

    .portrait {
      width: 160px;
      aspect-ratio: 1;
      border-radius: 16px;
      background: linear-gradient(135deg, #f1ece4, #e4eefb);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--muted);
      transition: transform .2s ease, box-shadow .2s ease;
      overflow: hidden;
    }

    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .portrait:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(31, 31, 27, 0.06);
    }

    .hero-copy h1 {
      font-size: clamp(2.2rem, 5vw, 3rem);
      letter-spacing: -0.05em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 14px;
      font-size: 0.98rem;
    }

    .hero-copy p {
      max-width: 720px;
      color: #3a3834;
      font-size: 0.98rem;
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-size: 0.95rem;
    }

    .links span { color: #b0a99d; }

    .section-title {
      font-size: 1.2rem;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .news-list,
    .paper-list,
    .contact-list,
    .exp-list {
      display: grid;
      gap: 12px;
    }

    .news-item,
    .contact-item,
    .exp-item {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 20px;
      padding: 8px 0;
      align-items: start;
      transition: transform .18s ease;
    }

    .news-item:hover,
    .contact-item:hover,
    .exp-item:hover {
      transform: translateX(2px);
    }

    .date,
    .meta {
      color: var(--muted);
      font-size: 0.93rem;
      white-space: nowrap;
      line-height: 1.5;
    }

    .paper {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      transition: transform .18s ease, background-color .18s ease;
      border-radius: 10px;
    }

    .paper:hover {
      transform: translateX(3px);
      background: rgba(255,255,255,0.45);
    }

    .paper:last-child { border-bottom: 0; }

    .paper-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      cursor: pointer;
    }

    .paper-group { margin-top: 18px; }
    .paper-group:first-child { margin-top: 0; }

    .paper-group-year {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }

    .paper-summary:hover h3,
    .paper-summary:focus-visible h3 { color: var(--accent); }

    .paper-summary:focus-visible {
      outline: 2px solid rgba(46,90,172,0.18);
      outline-offset: 4px;
      border-radius: 12px;
    }

    .paper h3 {
      font-size: 1.02rem;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.45;
      transition: color .18s ease;
    }

    .authors {
      font-size: 0.94rem;
      color: #3a3834;
      line-height: 1.55;
    }

    .venue {
      font-size: 0.93rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .paper-toggle {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      transition: border-color .18s ease, color .18s ease, background-color .18s ease;
    }

    .paper.is-open .paper-toggle {
      color: var(--accent);
      border-color: #d8e3fb;
      background: #f4f7ff;
    }

    .paper-extra {
      max-height: 0;
      overflow: hidden;
      transition: max-height .28s ease, margin-top .28s ease;
    }

    .paper.is-open .paper-extra {
      max-height: 220px;
      margin-top: 10px;
    }

    .paper-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .paper-links a {
      position: relative;
    }

    .paper-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .18s ease;
    }

    .paper-links a:hover::after {
      transform: scaleX(1);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      font-size: 0.82rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      background: var(--surface);
    }

    .section-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.86rem;
      cursor: pointer;
      transition: background-color .18s ease, border-color .18s ease, color .18s ease, transform .18s ease;
    }

    .filter-btn:hover {
      transform: translateY(-1px);
      color: var(--accent);
      border-color: #d6e0f8;
      background: #f5f8ff;
    }

    .filter-btn.active {
      color: var(--accent);
      border-color: #d6e0f8;
      background: #eef3ff;
    }

    .filter-meta {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .paper.is-hidden {
      display: none;
    }

    .paper-group.is-empty {
      display: none;
    }

    footer {
      margin-top: 28px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 760px) {
      .hero,
      .news-item,
      .contact-item,
      .exp-item,
      .paper-summary {
        grid-template-columns: 1fr;
      }

      .menu { display: none; }
      .date, .meta { white-space: normal; }
      .portrait { width: 130px; }
      .paper-toggle { justify-self: start; }
    }
  </style>
</head>

  function joinLinks(links) {
    return links.map((link, idx) => {
      const anchor = `<a href="${link.href}">${link.label}</a>`;
      return idx < links.length - 1 ? `${anchor}<span>|</span>` : anchor;
    }).join(' ');
  }

  function renderSimpleList(targetId, items) {
    const target = document.getElementById(targetId);
    if (!target) return;
    target.innerHTML = items.map(item => `
      <div class="exp-item">
        <div class="meta">${item.date}</div>
        <div>
          <strong>${item.title}</strong>${item.org ? `<br>${item.org}` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderNews() {
    const target = document.getElementById('news-list');
    if (!target) return;
    target.innerHTML = siteData.news.map(item => `
      <div class="news-item">
        <div class="date">${item.date}</div>
        <div>${item.text}</div>
      </div>
    `).join('');
  }

  function renderContact() {
    const target = document.getElementById('contact-list');
    if (!target) return;
    target.innerHTML = siteData.contact.map(item => `
      <div class="contact-item">
        <div class="meta">${item.label}</div>
        <div>${item.href ? `<a href="${item.href}">${item.value}</a>` : item.value}</div>
      </div>
    `).join('');
  }

  function normalizePublicationTags(paper, year) {
    const source = [paper.venue || '', ...(paper.tags || []), String(year)].join(' ').toLowerCase();
    const tokens = new Set();
    if (source.includes('tts') || source.includes('speech synthesis')) tokens.add('tts');
    if (source.includes('emotion') || source.includes('affective')) tokens.add('emotion');
    if (source.includes('voice conversion') || source.includes('vc')) tokens.add('vc');
    if (Number(year) >= 2025) tokens.add('recent');
    return Array.from(tokens);
  }

  function renderPublications() {
    const target = document.getElementById('publications-list');
    if (!target) return;
    const years = Object.keys(siteData.publications).sort((a, b) => Number(b) - Number(a));

    target.innerHTML = years.map(year => `
      <div class="paper-group" data-year="${year}">
        <div class="paper-group-year">${year}</div>
        ${siteData.publications[year].map(paper => {
          const filterTags = normalizePublicationTags(paper, year);
          return `
            <div class="paper" data-tags="${filterTags.join(' ')}">
              <div class="paper-summary" tabindex="0" role="button" aria-expanded="false">
                <div>
                  <h3>${paper.title}</h3>
                  <div class="authors">${paper.authors}</div>
                  <div class="venue">${paper.venue}</div>
                </div>
                <div class="paper-toggle">Details</div>
              </div>
              <div class="paper-extra">
                ${paper.tags && paper.tags.length ? `<div class="chip-row">${paper.tags.map(tag => `<span class="chip">${tag}</span>`).join('')}</div>` : ''}
                ${paper.links && paper.links.length ? `<div class="paper-links">${paper.links.map(link => `<a href="${link.href}">${link.label}</a>`).join('')}</div>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `).join('');
  }

  function setupPublicationFilters() {
    const buttons = document.querySelectorAll('#publication-filters .filter-btn');
    const count = document.getElementById('publication-count');
    const papers = document.querySelectorAll('#publications-list .paper');
    const groups = document.querySelectorAll('#publications-list .paper-group');

    const applyFilter = (filter) => {
      let visibleCount = 0;
      papers.forEach((paper) => {
        const tags = (paper.dataset.tags || '').split(' ').filter(Boolean);
        const isVisible = filter === 'all' || tags.includes(filter);
        paper.classList.toggle('is-hidden', !isVisible);
        if (isVisible) visibleCount += 1;
      });

      groups.forEach((group) => {
        const hasVisible = Array.from(group.querySelectorAll('.paper')).some((paper) => !paper.classList.contains('is-hidden'));
        group.classList.toggle('is-empty', !hasVisible);
      });

      if (count) count.textContent = `${visibleCount} publication${visibleCount === 1 ? '' : 's'}`;
      buttons.forEach((btn) => btn.classList.toggle('active', btn.dataset.filter === filter));
    };

    buttons.forEach((button) => {
      button.addEventListener('click', () => applyFilter(button.dataset.filter));
    });

    applyFilter('all');
  }

  function renderProfile() {
    document.getElementById('name').textContent = siteData.profile.name;
    document.getElementById('subtitle').textContent = siteData.profile.subtitle;
    document.getElementById('bio').textContent = siteData.profile.bio;
    document.getElementById('hero-links').innerHTML = joinLinks(siteData.profile.links);

    const portrait = document.getElementById('portrait');
    if (siteData.profile.photoSrc) {
      portrait.innerHTML = `<img src="${siteData.profile.photoSrc}" alt="${siteData.profile.name}">`;
    } else {
      portrait.textContent = siteData.profile.photoText || 'Photo';
    }
  }

  function initPage() {
    renderProfile();
    renderNews();
    renderSimpleList('education-list', siteData.education);
    renderSimpleList('experience-list', siteData.experience);
    renderSimpleList('projects-list', siteData.projects);
    renderPublications();
    renderSimpleList('awards-list', siteData.awards);
    renderSimpleList('patents-list', siteData.patents);
    renderSimpleList('services-list', siteData.services);
    renderContact();
    document.getElementById('footer-text').textContent = siteData.footer;

    setupPublicationFilters();

    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.menu a');
    const papers = document.querySelectorAll('.paper');

    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          if (entry.target.classList.contains('reveal')) entry.target.classList.add('is-visible');
          const targetNav = entry.target.dataset.nav || entry.target.id;
          navLinks.forEach((link) => {
            const href = link.getAttribute('href').replace('#', '');
            link.classList.toggle('active', href === targetNav);
          });
        }
      });
    }, { threshold: 0.22, rootMargin: '-10% 0px -10% 0px' });

    sections.forEach((section, index) => {
      section.style.transitionDelay = `${Math.min(index * 35, 180)}ms`;
      sectionObserver.observe(section);
    });

    papers.forEach((paper) => {
      const trigger = paper.querySelector('.paper-summary');
      if (!trigger) return;

      const toggle = () => {
        const isOpen = paper.classList.toggle('is-open');
        trigger.setAttribute('aria-expanded', String(isOpen));
      };

      trigger.addEventListener('click', toggle);
      trigger.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggle();
        }
      });
    });
  }

  initPage();
</script>
</body>
</html>
